version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: foodbytes-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-foodbytes}
      MYSQL_USER: ${DB_USER:-foodbytes_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-foodbytes_pass}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - foodbytes-network

  # Spring Boot API
  backend:
    build:
      context: ./foodbytes-api
      dockerfile: Dockerfile
    container_name: foodbytes-api
    restart: unless-stopped
    environment:
      # Database
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-foodbytes}
      DB_USERNAME: ${DB_USER:-foodbytes_user}
      DB_PASSWORD: ${DB_PASSWORD:-foodbytes_pass}
      # OAuth - Google
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      # OAuth - GitHub
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      # JWT
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-key-in-production-minimum-32-characters}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-604800000}
      JWT_COOKIE_NAME: ${JWT_COOKIE_NAME:-foodbytes_token}
      # CORS - allow frontend container
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost}
      # Server
      SERVER_PORT: 8080
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SECURITY_LOG_LEVEL: ${SECURITY_LOG_LEVEL:-WARN}
      SHOW_SQL: ${SHOW_SQL:-false}
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - foodbytes-network

  # React Frontend with nginx
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: foodbytes-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - foodbytes-network

networks:
  foodbytes-network:
    driver: bridge

volumes:
  mysql_data:
    name: foodbytes-mysql-data
